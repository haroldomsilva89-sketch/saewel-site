<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Raios do sol -->
  <line x1="50" y1="8" x2="50" y2="2" stroke="#F0A030" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="15" x2="78" y2="10" stroke="#E87820" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="88" y1="38" x2="94" y2="35" stroke="#F0A030" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="26" y1="15" x2="22" y2="10" stroke="#F0A030" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="12" y1="38" x2="6" y2="35" stroke="#E87820" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sol (metade superior, igual ao logo) -->
  <defs>
    <clipPath id="top"><rect x="0" y="0" width="100" height="56"/></clipPath>
  </defs>
  <circle cx="50" cy="56" r="48" fill="#F5C040" clip-path="url(#top)"/>
  <circle cx="50" cy="56" r="37" fill="#E8A020" clip-path="url(#top)"/>
  <circle cx="50" cy="56" r="28" fill="#F5C040" clip-path="url(#top)"/>

  <!-- Letra S centralizada -->
  <text x="50" y="52" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="30" fill="#7A3A00" opacity="0.6">S</text>
</svg>
